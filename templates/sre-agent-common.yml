# =============================================================================
# SRE Agent Common Utilities Template
# =============================================================================
# Shared helper steps for Azure SRE Agent integration across all pipelines.
# Handles authentication, CLI setup, API calls, and response parsing.
#
# Usage:
#   - template: templates/sre-agent-common.yml
#     parameters:
#       azureServiceConnection: 'azure-devops-sp2'
#       action: 'setup'  # setup | diagnostics | readiness | audit | baseline
#
# Prerequisites:
#   - Azure service connection with Contributor or SRE Agent Operator role
#   - Azure SRE Agent resource provisioned in target subscription
#   - Azure Monitor workspace connected to target services
# =============================================================================

parameters:
  - name: azureServiceConnection
    type: string
    displayName: 'Azure Service Connection'
  - name: action
    type: string
    default: 'setup'
    values:
      - setup
      - diagnostics
      - readiness
      - audit
      - baseline
      - mitigate
  - name: sreAgentResourceGroup
    type: string
    default: ''
    displayName: 'SRE Agent Resource Group'
  - name: sreAgentName
    type: string
    default: ''
    displayName: 'SRE Agent Instance Name'
  - name: targetResourceId
    type: string
    default: ''
    displayName: 'Target Azure Resource ID for diagnostics'
  - name: azureOpenAIEndpoint
    type: string
    default: ''
  - name: azureOpenAIDeployment
    type: string
    default: 'agentic-deveops-agent'
  - name: subscriptionId
    type: string
    default: ''

steps:
  # ──────────────────────────────────────────────
  # STEP 1: Install/verify Azure SRE Agent CLI extension
  # ──────────────────────────────────────────────
  - task: AzureCLI@2
    name: SREAgentSetup
    displayName: 'SRE Agent: Install CLI & Authenticate'
    inputs:
      azureSubscription: '${{ parameters.azureServiceConnection }}'
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        Write-Host "============================================" -ForegroundColor Cyan
        Write-Host "   AZURE SRE AGENT - SETUP & AUTH           " -ForegroundColor Cyan
        Write-Host "============================================" -ForegroundColor Cyan

        # Install the SRE Agent CLI extension (idempotent)
        Write-Host "Installing/updating Azure SRE Agent CLI extension..."
        az extension add --name sre-agent --upgrade --yes 2>$null
        if ($LASTEXITCODE -ne 0) {
          Write-Host "##vso[task.logissue type=warning]SRE Agent CLI extension not yet available - falling back to REST API mode"
          Write-Host "##vso[task.setvariable variable=SRE_CLI_AVAILABLE;isOutput=true]false"
                    $global:LASTEXITCODE = 0
        } else {
          Write-Host "SRE Agent CLI extension installed successfully"
          Write-Host "##vso[task.setvariable variable=SRE_CLI_AVAILABLE;isOutput=true]true"
        }

        # Get management token for ARM REST API calls
        $mgmtToken = az account get-access-token --resource https://management.azure.com --query accessToken -o tsv
                if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($mgmtToken)) {
                    Write-Host "##vso[task.logissue type=error]Failed to acquire ARM management token."
                    exit 1
                }
        Write-Host "##vso[task.setvariable variable=SRE_MGMT_TOKEN;isOutput=true;issecret=true]$mgmtToken"

        # Get AI token for Azure OpenAI agent calls
        $aiToken = az account get-access-token --resource https://cognitiveservices.azure.com --query accessToken -o tsv
                if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($aiToken)) {
                    Write-Host "##vso[task.logissue type=error]Failed to acquire Azure AI token."
                    exit 1
                }
        Write-Host "##vso[task.setvariable variable=SRE_AI_TOKEN;isOutput=true;issecret=true]$aiToken"

        # Get subscription context
        $subId = "${{ parameters.subscriptionId }}"
        if (-not $subId) {
          $subId = az account show --query id -o tsv
        }
                if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($subId)) {
                    Write-Host "##vso[task.logissue type=error]Failed to resolve Azure subscription ID."
                    exit 1
                }
        Write-Host "##vso[task.setvariable variable=SRE_SUBSCRIPTION_ID;isOutput=true]$subId"
        Write-Host "Subscription: $subId"

                # Verify Azure Monitor connectivity (non-blocking)
        Write-Host "Verifying Azure Monitor connectivity..."
                $null = az monitor action-group list --subscription $subId --query "length(@)" -o tsv 2>$null
                if ($LASTEXITCODE -eq 0) {
          Write-Host "Azure Monitor: Connected"
                } else {
          Write-Host "##vso[task.logissue type=warning]Azure Monitor connectivity could not be verified"
        }
                $global:LASTEXITCODE = 0

        Write-Host ""
        Write-Host "SRE Agent setup complete." -ForegroundColor Green
                $global:LASTEXITCODE = 0

  # ──────────────────────────────────────────────
  # STEP 2: Create reusable PowerShell helper functions
  # ──────────────────────────────────────────────
  - task: PowerShell@2
    name: SREHelpers
    displayName: 'SRE Agent: Initialize Helper Functions'
    inputs:
      targetType: inline
      pwsh: true
      script: |
        # Write shared helper script to disk for other steps to dot-source
        $helpersPath = "$(Agent.TempDirectory)/sre-agent-helpers.ps1"

        $helperScript = @'
        # ===== SRE Agent Shared Helper Functions =====

        function Invoke-SREAgentAPI {
            <#
            .SYNOPSIS
                Calls Azure SRE Agent REST API or falls back to Azure OpenAI with SRE-specific prompting.
            .PARAMETER Action
                The SRE action: diagnostics, readiness, audit, baseline, mitigate
            .PARAMETER TargetResourceId
                Azure resource ID to diagnose/analyze
            .PARAMETER Context
                Additional context string (logs, metrics, etc.)
            .PARAMETER Token
                Bearer token for Azure SRE Agent ARM API authentication
            .PARAMETER AIFallbackToken
                Bearer token for Azure OpenAI fallback authentication
            .PARAMETER Endpoint
                Azure OpenAI endpoint URL (fallback)
            .PARAMETER Deployment
                Azure OpenAI deployment name (fallback)
            #>
            param(
                [Parameter(Mandatory)][string]$Action,
                [string]$TargetResourceId = "",
                [string]$Context = "",
                [Parameter(Mandatory)][string]$Token,
                [string]$AIFallbackToken = "",
                [string]$Endpoint = "",
                [string]$Deployment = "agentic-deveops-agent",
                [string]$SubscriptionId = "",
                [string]$SREAgentName = "",
                [string]$SREAgentResourceGroup = ""
            )

            $result = @{ success = $false; response = ""; raw = $null }

            # Try SRE Agent REST API first (if resource is provisioned)
            # Uses the threads-based data-plane API at sre.azure.com
            # (POST /actions on management.azure.com is not a supported operation)
            if ($SREAgentName -and $SREAgentResourceGroup -and $SubscriptionId) {
                try {
                    $sreApiBase = "https://sre.azure.com/subscriptions/$SubscriptionId/resourceGroups/$SREAgentResourceGroup/providers/Microsoft.App/agents/$SREAgentName"
                    $apiVersion = "2025-05-01-preview"
                    $authHeaders = @{
                        "Authorization" = "Bearer $Token"
                        "Content-Type"  = "application/json"
                    }

                    # Step 1: Create a thread
                    $threadResp = Invoke-RestMethod `
                        -Uri "$sreApiBase/threads?api-version=$apiVersion" `
                        -Method POST `
                        -Headers $authHeaders `
                        -Body "{}" `
                        -TimeoutSec 30
                    $threadId = $threadResp.id
                    if (-not $threadId) { throw "Thread creation returned no id" }

                    # Step 2: Add a user message
                    $userContent = "**ACTION:** $Action`n**RESOURCE:** $TargetResourceId`n`n$Context"
                    $msgBody = @{ role = "user"; content = $userContent } | ConvertTo-Json -Depth 5
                    $null = Invoke-RestMethod `
                        -Uri "$sreApiBase/threads/$threadId/messages?api-version=$apiVersion" `
                        -Method POST `
                        -Headers $authHeaders `
                        -Body $msgBody `
                        -TimeoutSec 30

                    # Step 3: Create a run
                    $runResp = Invoke-RestMethod `
                        -Uri "$sreApiBase/threads/$threadId/runs?api-version=$apiVersion" `
                        -Method POST `
                        -Headers $authHeaders `
                        -Body "{}" `
                        -TimeoutSec 30
                    $runId = $runResp.id
                    if (-not $runId) { throw "Run creation returned no id" }

                    # Step 4: Poll for completion (max 120 s)
                    $maxWait = 120; $waited = 0; $pollSec = 5; $runStatus = ""
                    while ($waited -lt $maxWait) {
                        Start-Sleep -Seconds $pollSec
                        $waited += $pollSec
                        $pollResp = Invoke-RestMethod `
                            -Uri "$sreApiBase/threads/$threadId/runs/$runId?api-version=$apiVersion" `
                            -Method GET `
                            -Headers $authHeaders `
                            -TimeoutSec 30
                        $runStatus = $pollResp.status
                        if ($runStatus -in @("completed", "failed", "cancelled", "expired")) { break }
                    }

                    if ($runStatus -ne "completed") { throw "Run ended with status: $runStatus" }

                    # Step 5: Retrieve the latest assistant message
                    $msgsResp = Invoke-RestMethod `
                        -Uri "$sreApiBase/threads/$threadId/messages?api-version=$apiVersion&order=desc&limit=10" `
                        -Method GET `
                        -Headers $authHeaders `
                        -TimeoutSec 30
                    $assistantMsg = @($msgsResp.data | Where-Object { $_.role -eq "assistant" }) | Select-Object -First 1
                    if (-not $assistantMsg) { throw "No assistant message found in thread $threadId" }
                    $textContent = @($assistantMsg.content | Where-Object { $_.type -eq "text" }) | Select-Object -First 1
                    $responseText = if ($textContent) { $textContent.text.value } else { $assistantMsg.content | ConvertTo-Json -Depth 5 }

                    $result.success = $true
                    $result.response = $responseText
                    $result.raw = $msgsResp
                    return $result
                } catch {
                    Write-Host "  SRE Agent API call failed, falling back to AI agent: $_" -ForegroundColor Yellow
                }
            }

            # Fallback: Use Azure OpenAI with SRE-specific system prompt
            if ($Endpoint) {
                $openAIToken = if ($AIFallbackToken) { $AIFallbackToken } else { $Token }
                $sreSystemPrompt = Get-SRESystemPrompt -Action $Action

                $targetEndpoint = "$Endpoint".Trim()
                if ($targetEndpoint -match '^\$\([^)]+\)$') {
                    $result.response = "AI fallback endpoint variable is unresolved: $targetEndpoint"
                    return $result
                }

                $targetEndpoint = $targetEndpoint.TrimEnd('/')
                if ($targetEndpoint -match '/openai/v1$') {
                    $targetEndpoint = "$targetEndpoint/chat/completions"
                } elseif ($targetEndpoint -match '/openai$') {
                    $targetEndpoint = "$targetEndpoint/v1/chat/completions"
                } elseif ($targetEndpoint -notmatch '/openai/') {
                    $targetEndpoint = "$targetEndpoint/openai/v1/chat/completions"
                }

                $lowerEndpoint = $targetEndpoint.ToLowerInvariant()
                $userMessage = "**TARGET RESOURCE:** $TargetResourceId`n**ACTION REQUESTED:** $Action`n`n**CONTEXT DATA:**`n$Context"
                $chatMessages = @(
                    @{ role = "system"; content = $sreSystemPrompt }
                    @{ role = "user"; content = $userMessage }
                )
                $isDeploymentPathEndpoint = $lowerEndpoint -match '/openai/deployments/'

                function Get-HttpFailureDetail {
                    param($ErrorRecord)

                    $detail = ""

                    if ($ErrorRecord -and $ErrorRecord.ErrorDetails -and $ErrorRecord.ErrorDetails.Message) {
                        $detail = "$($ErrorRecord.ErrorDetails.Message)"
                    }

                    if ([string]::IsNullOrWhiteSpace($detail) -and
                        $ErrorRecord -and $ErrorRecord.Exception -and
                        $ErrorRecord.Exception.Response -and
                        $ErrorRecord.Exception.Response.Content) {
                        try {
                            $detail = $ErrorRecord.Exception.Response.Content.ReadAsStringAsync().GetAwaiter().GetResult()
                        } catch {
                            # fall back to exception text
                        }
                    }

                    if ([string]::IsNullOrWhiteSpace($detail) -and $ErrorRecord -and $ErrorRecord.Exception) {
                        $detail = "$($ErrorRecord.Exception.Message)"
                    }

                    $detail = ($detail -replace '[\r\n]+', ' ').Trim()
                    if ($detail.Length -gt 600) {
                        $detail = $detail.Substring(0, 600) + "..."
                    }

                    return $detail
                }

                $attempts = New-Object 'System.Collections.Generic.List[object]'

                if ($lowerEndpoint -match '/responses(\?|$)') {
                    $responsesWithLimit = @{
                        input = @(
                            @{ role = "system"; content = $sreSystemPrompt }
                            @{ role = "user"; content = $userMessage }
                        )
                        max_output_tokens = 4096
                    }
                    if (-not $isDeploymentPathEndpoint) { $responsesWithLimit.model = $Deployment }
                    $attempts.Add([PSCustomObject]@{
                        label = "responses-max_output_tokens"
                        endpoint = $targetEndpoint
                        body = ($responsesWithLimit | ConvertTo-Json -Depth 12)
                    })

                    $responsesMinimal = @{
                        input = @(
                            @{ role = "system"; content = $sreSystemPrompt }
                            @{ role = "user"; content = $userMessage }
                        )
                    }
                    if (-not $isDeploymentPathEndpoint) { $responsesMinimal.model = $Deployment }
                    $attempts.Add([PSCustomObject]@{
                        label = "responses-minimal"
                        endpoint = $targetEndpoint
                        body = ($responsesMinimal | ConvertTo-Json -Depth 12)
                    })

                    if (-not $isDeploymentPathEndpoint) {
                        $chatEndpoint = $targetEndpoint -replace '/responses(\?|$)', '/chat/completions$1'
                        if ($chatEndpoint -ne $targetEndpoint) {
                            $chatFallbackBody = @{
                                model = $Deployment
                                messages = $chatMessages
                                max_completion_tokens = 4096
                            } | ConvertTo-Json -Depth 12

                            $attempts.Add([PSCustomObject]@{
                                label = "chat-fallback-max_completion_tokens"
                                endpoint = $chatEndpoint
                                body = $chatFallbackBody
                            })
                        }
                    }
                } else {
                    $chatWithCompletionTokens = @{
                        messages = $chatMessages
                        max_completion_tokens = 4096
                    }
                    if (-not $isDeploymentPathEndpoint) { $chatWithCompletionTokens.model = $Deployment }
                    $attempts.Add([PSCustomObject]@{
                        label = "chat-max_completion_tokens"
                        endpoint = $targetEndpoint
                        body = ($chatWithCompletionTokens | ConvertTo-Json -Depth 12)
                    })

                    $chatWithMaxTokens = @{
                        messages = $chatMessages
                        max_tokens = 4096
                    }
                    if (-not $isDeploymentPathEndpoint) { $chatWithMaxTokens.model = $Deployment }
                    $attempts.Add([PSCustomObject]@{
                        label = "chat-max_tokens"
                        endpoint = $targetEndpoint
                        body = ($chatWithMaxTokens | ConvertTo-Json -Depth 12)
                    })

                    $chatMinimal = @{
                        messages = $chatMessages
                    }
                    if (-not $isDeploymentPathEndpoint) { $chatMinimal.model = $Deployment }
                    $attempts.Add([PSCustomObject]@{
                        label = "chat-minimal"
                        endpoint = $targetEndpoint
                        body = ($chatMinimal | ConvertTo-Json -Depth 12)
                    })

                    if (-not $isDeploymentPathEndpoint) {
                        $responsesEndpoint = $targetEndpoint -replace '/chat/completions(\?|$)', '/responses$1'
                        if ($responsesEndpoint -ne $targetEndpoint) {
                            $responsesFallback = @{
                                model = $Deployment
                                input = @(
                                    @{ role = "system"; content = $sreSystemPrompt }
                                    @{ role = "user"; content = $userMessage }
                                )
                                max_output_tokens = 4096
                            } | ConvertTo-Json -Depth 12

                            $attempts.Add([PSCustomObject]@{
                                label = "responses-fallback"
                                endpoint = $responsesEndpoint
                                body = $responsesFallback
                            })
                        }
                    }
                }

                $failureDetails = @()
                foreach ($attempt in $attempts) {
                    try {
                        $response = Invoke-RestMethod -Uri $attempt.endpoint `
                            -Method POST `
                            -Headers @{
                                "Authorization" = "Bearer $openAIToken"
                                "Content-Type" = "application/json"
                            } `
                            -Body $attempt.body `
                            -TimeoutSec 120

                        $parsed = Get-AIResponseText -Response $response
                        if ([string]::IsNullOrWhiteSpace("$parsed")) {
                            $parsed = $response | ConvertTo-Json -Depth 12
                        }

                        $result.success = $true
                        $result.response = $parsed
                        $result.raw = $response
                        return $result
                    } catch {
                        $detail = Get-HttpFailureDetail -ErrorRecord $_
                        $failureDetails += "$($attempt.label): $detail"
                    }
                }

                if ($failureDetails.Count -gt 0) {
                    $result.response = "SRE Agent API and AI fallback both failed: " + ($failureDetails -join " | ")
                } else {
                    $result.response = "SRE Agent API and AI fallback both failed: no attempt was executed."
                }
            }

            return $result
        }

        function Get-SRESystemPrompt {
            param([string]$Action)

            $prompts = @{
                "diagnostics" = @"
            You are Azure SRE Agent, an AI-powered reliability assistant. Perform deep diagnostics on the specified Azure resource.
            Analyze: service health, error rates, latency percentiles, resource utilization, dependency health, recent changes.
            Output a structured diagnostic report with severity levels: CRITICAL, HIGH, MEDIUM, LOW, INFO.
            Include root cause analysis and specific remediation steps.
        "@
                "readiness" = @"
            You are Azure SRE Agent performing a pre-deployment readiness assessment.
            Evaluate: current service health, dependency availability, resource capacity, recent incident history, deployment risk factors.
            Output a GO/NO-GO decision with confidence score (0-100) and specific risk factors.
            If NO-GO, list blocking issues and required remediation.
        "@
                "audit" = @"
            You are Azure SRE Agent performing a reliability audit.
            Evaluate: SLO compliance, error budgets, resource utilization trends, configuration drift, security posture, backup status, scaling policies.
            Output a structured audit report with findings categorized by reliability pillar (Availability, Performance, Resilience, Observability, Security).
            Include specific recommendations with effort estimates.
        "@
                "baseline" = @"
            You are Azure SRE Agent managing performance baselines.
            Compare current metrics against established baselines. Identify: anomalies, degradations, improvements, and trend changes.
            Output a baseline comparison report with statistical significance indicators.
            Flag any metrics that deviate more than 2 standard deviations from baseline.
        "@
                "mitigate" = @"
            You are Azure SRE Agent executing automated mitigation for reliability incidents.
            If context contains "FILE TO FIX" and "CURRENT FILE CONTENT", return ONLY the corrected full file content for that file.
            Keep changes minimal, preserve formatting/style, and avoid adding extra explanation text.
            If no file content is provided, return concise mitigation actions prioritized by safety and reversibility.
        "@
            }

            if ($prompts.ContainsKey($Action)) { return $prompts[$Action] }
            return "You are Azure SRE Agent. Analyze the provided context and give actionable reliability recommendations."
        }

        function Get-AIResponseText {
            param($Response)
            if ($Response.output -and $Response.output[0].content) { return $Response.output[0].content[0].text }
            if ($Response.output_text) { return $Response.output_text }
            if ($Response.choices -and $Response.choices[0].message) {
                $content = $Response.choices[0].message.content
                if ($content -is [System.Array]) {
                    return (($content | ForEach-Object {
                        if ($_ -and $_.text) { "$($_.text)" }
                        elseif ($_ -and $_.content) { "$($_.content)" }
                        else { "$_" }
                    }) -join "")
                }
                return $content
            }
            if ($Response.text) { return $Response.text }
            if ($Response.content) { return $Response.content }
            if ($Response -is [string]) { return $Response }
            return $null
        }

        function Get-AzureResourceHealth {
            param(
                [string]$ResourceId,
                [string]$Token
            )
            try {
                $apiVersion = "2023-07-01-preview"
                $uri = "https://management.azure.com${ResourceId}/providers/Microsoft.ResourceHealth/availabilityStatuses/current?api-version=$apiVersion"
                $health = Invoke-RestMethod -Uri $uri -Headers @{ "Authorization" = "Bearer $Token" } -TimeoutSec 30
                return @{
                    status = $health.properties.availabilityState
                    summary = $health.properties.summary
                    reason = $health.properties.reasonType
                    since = $health.properties.occurredTime
                }
            } catch {
                return @{ status = "Unknown"; summary = "Could not retrieve health: $_"; reason = ""; since = "" }
            }
        }

        function Get-AzureMonitorMetrics {
            param(
                [string]$ResourceId,
                [string]$Token,
                [string]$MetricNames = "Availability,SuccessE2ELatency,Transactions",
                [string]$Timespan = "PT1H",
                [string]$Interval = "PT5M"
            )
            try {
                $apiVersion = "2023-10-01"
                $uri = "https://management.azure.com${ResourceId}/providers/Microsoft.Insights/metrics?api-version=$apiVersion&metricnames=$MetricNames&timespan=$Timespan&interval=$Interval"
                $metrics = Invoke-RestMethod -Uri $uri -Headers @{ "Authorization" = "Bearer $Token" } -TimeoutSec 30
                return $metrics
            } catch {
                Write-Host "  Could not fetch metrics: $_" -ForegroundColor Yellow
                return $null
            }
        }

        function Get-AzureMonitorAlerts {
            param(
                [string]$SubscriptionId,
                [string]$Token,
                [string]$Timespan = "1h"
            )
            try {
                $apiVersion = "2023-01-01"
                $uri = "https://management.azure.com/subscriptions/$SubscriptionId/providers/Microsoft.AlertsManagement/alerts?api-version=$apiVersion&timeRange=$Timespan"
                $alerts = Invoke-RestMethod -Uri $uri -Headers @{ "Authorization" = "Bearer $Token" } -TimeoutSec 30
                return $alerts.value
            } catch {
                Write-Host "  Could not fetch alerts: $_" -ForegroundColor Yellow
                return @()
            }
        }

        function Get-AzureActivityLog {
            param(
                [string]$SubscriptionId,
                [string]$Token,
                [int]$HoursBack = 2
            )
            try {
                $startTime = (Get-Date).AddHours(-$HoursBack).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
                $filter = "eventTimestamp ge '$startTime'"
                $apiVersion = "2015-04-01"
                $uri = "https://management.azure.com/subscriptions/$SubscriptionId/providers/Microsoft.Insights/eventtypes/management/values?api-version=$apiVersion&`$filter=$filter&`$top=50"
                $activity = Invoke-RestMethod -Uri $uri -Headers @{ "Authorization" = "Bearer $Token" } -TimeoutSec 30
                return $activity.value
            } catch {
                Write-Host "  Could not fetch activity log: $_" -ForegroundColor Yellow
                return @()
            }
        }

        function Format-SREReport {
            param(
                [string]$Title,
                [string]$Content,
                [hashtable]$Metadata = @{}
            )

            $report = @"
        # $Title

        **Build:** $($env:BUILD_BUILDNUMBER)
        **Branch:** $($env:BUILD_SOURCEBRANCH)
        **Pipeline:** $($env:BUILD_DEFINITIONNAME)
        **Date:** $(Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
        **Requested By:** $($env:BUILD_REQUESTEDFOR)

        $(if ($Metadata.Count -gt 0) {
            "## Metadata`n" + ($Metadata.GetEnumerator() | ForEach-Object { "| $($_.Key) | $($_.Value) |" } | Out-String)
        })

        ## Analysis

        $Content
        "@
            return $report
        }

        Write-Host "SRE Agent helper functions loaded." -ForegroundColor Green
        '@

        Set-Content -Path $helpersPath -Value $helperScript -Force
        # Strip the 8-space leading indentation inherited from YAML embedding
        $cleaned = (Get-Content $helpersPath -Raw) -replace '(?m)^        ', ''
        Set-Content -Path $helpersPath -Value $cleaned -Force
        Write-Host "##vso[task.setvariable variable=SRE_HELPERS_PATH;isOutput=true]$helpersPath"
        Write-Host "Helper functions written to: $helpersPath"
